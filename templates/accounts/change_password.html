{% extends 'dashboard_base.html' %}
{% load static %}

{% block page_title %}Change Password{% endblock %}

{% block dashboard_content %}
<div class="card">
    <div class="card-title">Change Password</div>
    
    <form method="post" style="max-width: 500px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Current Password</label>
            <input type="password" name="current_password" id="current_password" class="form-control" style="width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px;" required>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">New Password</label>
            <input type="password" name="new_password" id="new_password" class="form-control" style="width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px;" required>
            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem;">Minimum 8 characters</div>
        </div>
        
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" style="width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 8px;" required>
            <div id="passwordMatchError" style="color: var(--danger); font-size: 0.7rem; margin-top: 0.25rem; display: none;">Passwords do not match</div>
        </div>
        
        <div style="display: flex; gap: 0.75rem;">
            <button type="submit" class="btn-primary" id="submitBtn">Change Password</button>
            <a href="{% url 'profile' %}" class="btn-outline">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(0,200,83,0.1);
    }
</style>

<script>
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');
    const passwordMatchError = document.getElementById('passwordMatchError');
    const submitBtn = document.getElementById('submitBtn');
    
    function validatePasswords() {
        if (newPassword.value !== confirmPassword.value) {
            passwordMatchError.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
            submitBtn.style.cursor = 'not-allowed';
        } else {
            passwordMatchError.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.style.cursor = 'pointer';
        }
    }
    
    newPassword.addEventListener('keyup', validatePasswords);
    confirmPassword.addEventListener('keyup', validatePasswords);
    
    // Also validate on blur
    newPassword.addEventListener('blur', validatePasswords);
    confirmPassword.addEventListener('blur', validatePasswords);
</script>
{% endblock %}
